<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rezept hinzufügen</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff8e1;
      padding: 2rem;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 2rem;
      border-radius: 12px;
    }

    input, textarea {
      width: 100%;
      padding: 0.8rem;
      margin-bottom: 1rem;
    }

    button {
      background: #ffe082;
      border: none;
      padding: 1rem;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
    }

    button:hover {
      background: #ffd54f;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Neues Rezept hinzufügen 🍰</h1>

  <input type="text" id="title" placeholder="Rezeptname">

  <textarea id="description" placeholder="Beschreibung"></textarea>

  <textarea id="preparation" placeholder="Zubereitung"></textarea>

  
  <h3>Zutaten</h3>

<div id="ingredients-container"></div>

<button type="button" id="addIngredient">
  + Zutat hinzufügen
</button>

<br><br>

  <button id="saveBtn">Rezept speichern</button>

</div>

<script type="module">
import { db } from './firebase.js';
import {
  collection,
  addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

document.addEventListener("DOMContentLoaded", () => {

  const saveBtn = document.getElementById("saveBtn");
  const addIngredientBtn = document.getElementById("addIngredient");
  const ingredientsContainer = document.getElementById("ingredients-container");

  function addIngredientField() {

    const div = document.createElement("div");

    div.style.marginBottom = "1rem";

    div.innerHTML = `
      <input type="number" placeholder="Menge" class="menge">
      <input type="text" placeholder="Einheit" class="einheit">
      <input type="text" placeholder="Zutat" class="name">
    `;

    ingredientsContainer.appendChild(div);
  }

  addIngredientBtn.addEventListener("click", addIngredientField);

  addIngredientField(); // erstes Feld automatisch

  saveBtn.addEventListener("click", async () => {

    const title = document.getElementById("title").value;
    const description = document.getElementById("description").value;
    const preparation = document.getElementById("preparation").value;

    const zutaten = [];

    const ingredientDivs = ingredientsContainer.children;

    for (const div of ingredientDivs) {

      const menge = div.querySelector(".menge").value;
      const einheit = div.querySelector(".einheit").value;
      const name = div.querySelector(".name").value;

      if (name.trim() !== "") {

      zutaten.push({
        menge,
        einheit,
        name
      });

    }
    }
const zutatenText = zutaten
  .map(z => `${z.menge} ${z.einheit} ${z.name}`)
  .join(", ");

const prompt = `
Professionelles Foodfoto von ${title}.

Beschreibung:
${description}

Zutaten:
${zutatenText}

Zubereitung:
${preparation}

Das Essen soll appetitlich,
realistisch,
hochwertig,
warm beleuchtet
und wie ein modernes Foodblog-Foto aussehen.
`;

    const image = await generiereBild(prompt);
    try {
      await addDoc(collection(db, "rezepte"), {
        title,
        description,
        zubereitung: preparation,
        image,
        zutaten
      });

      alert("Rezept gespeichert 🎉");

    } catch (e) {
      console.error(e);
      alert("Fehler beim Speichern");
    }

  });

});
async function generiereBild(prompt) {


  return "https://images.unsplash.com/photo-1546069901-ba9599a7e63c";
}
</script>

</body>
</html>
