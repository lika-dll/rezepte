</head>

<body>

  <div class="container">

    <h1>Neues Rezept hinzufügen 🍰</h1>

    <input type="text" id="title" placeholder="Rezeptname">

    <textarea id="description" placeholder="Beschreibung"></textarea>

    <textarea id="preparation" placeholder="Zubereitung"></textarea>


    <h3>Zutaten</h3>

    <div id="ingredients-container"></div>

    <button type="button" id="addIngredient">
      + Zutat hinzufügen
    </button>

    <br><br>

    <button id="saveBtn">Rezept speichern</button>

  </div>

  <script type="module">
    import { db } from './firebase.js';
    import {
      collection,
      addDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    document.addEventListener("DOMContentLoaded", () => {

      const saveBtn = document.getElementById("saveBtn");
      const addIngredientBtn = document.getElementById("addIngredient");
      const ingredientsContainer = document.getElementById("ingredients-container");

      function addIngredientField() {

        const div = document.createElement("div");

        div.style.marginBottom = "1rem";

        div.innerHTML = `
      <input type="number" placeholder="Menge" class="menge">
      <input type="text" placeholder="Einheit" class="einheit">
      <input type="text" placeholder="Zutat" class="name">
    `;

        ingredientsContainer.appendChild(div);
      }

      addIngredientBtn.addEventListener("click", addIngredientField);

      addIngredientField(); // erstes Feld automatisch

      saveBtn.addEventListener("click", async () => {

        const title = document.getElementById("title").value;
        const description = document.getElementById("description").value;
        const preparation = document.getElementById("preparation").value;

        const zutaten = [];

        const ingredientDivs = ingredientsContainer.children;

        for (const div of ingredientDivs) {

          const menge = div.querySelector(".menge").value;
          const einheit = div.querySelector(".einheit").value;
          const name = div.querySelector(".name").value;

          if (name.trim() !== "") {

            zutaten.push({
              menge,
              einheit,
              name
            });

          }
        }
        const zutatenText = zutaten
          .map(z => `${z.menge} ${z.einheit} ${z.name}`)
          .join(", ");

        const prompt = `
Professional food photography of ${title}.

Ingredients: ${(zutaten || []).map(z => z.name).join(", ")}.

Ultra realistic, high quality, soft lighting, cinematic, shallow depth of field,
restaurant style plating, wooden table, 50mm lens, no text, no watermark.
`;
        const image = await generiereBild(prompt);
        try {
          await addDoc(collection(db, "rezepte"), {
            title,
            description,
            zubereitung: preparation,
            image,
            zutaten
          });

          alert("Rezept gespeichert 🎉");
           window.location.href = "index.html";

        } catch (e) {
          console.error(e);
          alert("Fehler beim Speichern");
        }

      });

    });
    async function generiereBild(prompt) {
  const url = "https://image.pollinations.ai/prompt/" + encodeURIComponent(prompt);

  // optional: direkt zurückgeben (kein API call nötig)
  return url;
}
  </script>
