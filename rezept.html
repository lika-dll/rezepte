<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rezept</title>
    <style>
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Wird über JS auf jede Badge gesetzt */
        .badge-zutat {
            opacity: 0;
            animation: fadeInUp 0.4s forwards;
        }

        /* Bild sanft reinzoomen */
        #rezept-bild {
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        #rezept-bild.visible {
            opacity: 1;
            transform: scale(1);
        }

        html,
        body {
            height: 100%;
            margin: 0;
        }

        body {
            background: linear-gradient(90deg, #fff8e1, #ffe082);


            font-family: 'Segoe UI', sans-serif;
        }

        .badge-zutat,
        .btn-teilen {
            background-color: #ffe082;
            color: #5d4037;
            padding: 0.4rem 0.75rem;
            border-radius: 1rem;
            display: inline-block;
            margin: 0.2rem 0.4rem 0.2rem 0;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            text-decoration: none;
        }

        .btn-teilen:hover {
            background-color: #f7d160;
        }

        #personen {
            -webkit-appearance: none;
            width: 100%;
            height: 10px;
            border-radius: 5px;
            background: linear-gradient(to right, #ffe082 0%, #ffe082 50%, #ccc 50%, #ccc 100%);
            outline: none;
            margin: 1rem 0 2rem 0;
        }

        #personen::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #ffe082;
            cursor: pointer;
            box-shadow: 0 0 6px rgba(93, 64, 55, 0.3);
            margin-top: -7px;
            transition: background 0.3s ease;
        }

        #personen::-moz-range-thumb {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #ffe082;
            cursor: pointer;
            box-shadow: 0 0 6px rgba(93, 64, 55, 0.3);
            transition: background 0.3s ease;
        }

        #rezept-bild {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 1rem;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        #qrcode-container {
            display: none;
            margin-top: 1rem;
            text-align: center;
        }




        /* Fließtext großzügiger setzen */
        body {
            font-family: Verdana, Geneva, sans-serif;
            /* etwas weiter geschnitten als Segoe UI */
            font-size: 1rem;
            line-height: 1.8;
            /* mehr Zeilenabstand */
            letter-spacing: 0.02em;
            /* minimal mehr Buchstabenabstand */
            color: #5d4037;
        }

        /* Überschriften mit Serif, aber luftiger */
        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: "Palatino Linotype", Georgia, serif;
            line-height: 1.3;
            letter-spacing: 0.03em;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
        }

        /* Buttons & Badges etwas größer und mit mehr Padding */
        .badge-zutat,
        .btn-teilen {
            font-size: 1rem;
            padding: 0.6rem 1rem;
            letter-spacing: 0.02em;
        }

        /* Optional: Für Mobile nochmal anpassen */
        @media (max-width: 600px) {
            body {
                font-size: 0.95rem;
                line-height: 1.6;
            }

            .badge-zutat,
            .btn-teilen {
                font-size: 0.9rem;
                padding: 0.5rem 0.75rem;
            }
        }
    </style>
</head>

<body>


    <div style="max-width: 600px; margin: 2rem auto; padding: 1rem; background: white; border-radius: 8px;">
        <a href="index.html" class="btn btn-secondary badge-zutat mb-4">&larr; Zurück zur Übersicht</a>
        <h1 id="rezept-title">Rezept wird geladen...</h1>

        <img id="rezept-bild" src="" alt="Rezeptbild" style="display:none;" />

        <label for="personen">Portionen: <span id="personen-anzahl">1</span></label>
        <input type="range" min="1" max="10" value="1" id="personen" />

        <h3>Zutaten:</h3>
        <div id="zutaten-liste"></div>

        <h3>Zubereitung:</h3>
        <p id="zubereitung-text"></p>

        <!-- Teilen -->
        <div class="mt-4">
            <h4>Rezept teilen:</h4>
            <button class="btn-teilen" onclick="teilePerWhatsApp()">📱 WhatsApp</button>
            <button class="btn-teilen" onclick="teilePerEmail()">✉️ E-Mail</button>
            <button class="btn-teilen" onclick="copyLink()">🔗 Link kopieren</button>
            <button class="btn-teilen" onclick="zeigeQRCode()">📷 QR-Code anzeigen</button>
        </div>

        <div id="qrcode-container">
            <img id="qrcode" alt="QR-Code" width="150" />
        </div>

    </div>
   <script type="module">

import { db } from './firebase.js';

import {
    doc,
    getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

function getRezeptId() {

    const params = new URLSearchParams(window.location.search);

    return params.get('id') || '';

}
async function generateImage(prompt) {
     const res = await fetch("https://api.replicate.com/v1/predictions", {
    method: "POST",
    headers: {
      "Authorization": "Token DEIN_API_KEY",
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      version: "MODEL_ID_HIER",
      input: {
        prompt: prompt
      }
    })
  });

  const data = await res.json();

  return data.output[0];
}
async function init() {

    const rezeptId = getRezeptId();

    let rezept = null;

    // ZUERST Firebase versuchen
    try {

        const docRef = doc(db, "rezepte", rezeptId);

        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {

            rezept = docSnap.data();

        }

    } catch (error) {

        console.error("Firebase Fehler:", error);

    }

    // WENN NICHT GEFUNDEN → JSON
    if (!rezept) {

        try {

            const response = await fetch('rezepte.json');

            if (!response.ok) {
                throw new Error("JSON konnte nicht geladen werden");
            }

            const rezepte = await response.json();

            rezept = rezepte[rezeptId];

        } catch (error) {

            console.error("JSON Fehler:", error);

        }

    }

    const titelEl = document.getElementById('rezept-title');
    const zutatenListe = document.getElementById('zutaten-liste');
    const zubereitungText = document.getElementById('zubereitung-text');
    const personenInput = document.getElementById('personen');
    const personenAnzeige = document.getElementById('personen-anzahl');
    const bildEl = document.getElementById('rezept-bild');

    // Falls Rezept nicht existiert
    if (!rezept) {

        titelEl.textContent = "Rezept nicht gefunden.";

        return;

    }

    // Titel
    titelEl.textContent = rezept.title || "Ohne Titel";

    // Zubereitung
    zubereitungText.textContent =
        rezept.zubereitung ||
        rezept.preparation ||
        "Keine Zubereitung vorhanden.";

    // Bild
// Bild
// Bild
if (rezept.image) {

    // 🟢 gespeichertes Bild (Firebase / alte Rezepte)
    bildEl.src = rezept.image;
    bildEl.style.display = 'block';

    setTimeout(() => {
        bildEl.classList.add('visible');
    }, 50);

} else {

    // 🔥 KI Bild (nur wenn KEIN Bild existiert)

    bildEl.style.display = 'block';

    const prompt = `
Professional food photography of "${rezept.title}".

Ingredients: ${(rezept.zutaten || [])
        .map(z => z.name)
        .filter(Boolean)
        .join(", ")}

Style:
- ultra realistic food photography
- soft natural lighting
- shallow depth of field
- cinematic
- high detail
- modern food blog style

No text, no watermark, no people, no hands.
`;

    const url =
        "https://image.pollinations.ai/prompt/" +
        encodeURIComponent(prompt);

    bildEl.src = url;

    setTimeout(() => {
        bildEl.classList.add('visible');
    }, 50);
}

    generateImage(prompt).then(url => {
        bildEl.src = url;

        setTimeout(() => {
            bildEl.classList.add('visible');
        }, 50);
    });

}

    

    // Zutaten aktualisieren
    function aktualisiereZutaten() {

        const personen = parseInt(personenInput.value, 10) || 1;

        personenAnzeige.textContent = personen;

        zutatenListe.innerHTML = '';

        (rezept.zutaten || []).forEach((zutat, idx) => {

            // Leere Zutaten überspringen
            if (!zutat.name) return;

            const mengeNum = Number(zutat.menge) || 0;

            const mengeNeu =
                (mengeNum * personen)
                .toFixed(2)
                .replace(/\.00$/, '');

            const text =
                `${mengeNeu} ${zutat.einheit} ${zutat.name}`;

            const span = document.createElement('span');

            span.className = 'badge-zutat';

            span.style.animationDelay = `${idx * 0.1}s`;

            span.textContent = text;

            zutatenListe.appendChild(span);

        });

        // Slider-Farbe
        const max = parseInt(personenInput.max, 10);

        const percent =
            ((personen - 1) / (max - 1)) * 100;

        personenInput.style.background =
            `linear-gradient(to right,
            #ffe082 0%,
            #ffe082 ${percent}%,
            #ccc ${percent}%,
            #ccc 100%)`;
    }

    personenInput.addEventListener('input', aktualisiereZutaten);

    aktualisiereZutaten();

}

// Teilen

function teilePerWhatsApp() {

    const url = encodeURIComponent(window.location.href);

    const text = `Schau dir dieses Rezept an! ${url}`;

    window.open(
        `https://api.whatsapp.com/send?text=${text}`,
        '_blank'
    );

}

function teilePerEmail() {

    const subject =
        encodeURIComponent("Leckeres Rezept für dich");

    const body =
        encodeURIComponent(
            "Hier ist ein tolles Rezept:\n" +
            window.location.href
        );

    window.location.href =
        `mailto:?subject=${subject}&body=${body}`;

}

function copyLink() {

    const url = window.location.href;

    navigator.clipboard.writeText(url).then(() => {

        alert("Link wurde kopiert!");

    });

}

function zeigeQRCode() {

    const qrImage = document.getElementById("qrcode");

    qrImage.src =
        "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data="
        + encodeURIComponent(window.location.href);

    document.getElementById("qrcode-container").style.display =
        "block";

}

window.teilePerWhatsApp = teilePerWhatsApp;
window.teilePerEmail = teilePerEmail;
window.copyLink = copyLink;
window.zeigeQRCode = zeigeQRCode;

init();

</script>
</body>

</html>
