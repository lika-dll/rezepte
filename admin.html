<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">
  <title>Admin Login</title>

  <style>

    body {
      margin: 0;
      height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      background: linear-gradient(135deg, #fff8e1, #ffe082);

      font-family: 'Segoe UI', sans-serif;
    }

    .login-box {

      background: white;

      padding: 3rem;

      border-radius: 20px;

      width: 320px;

      box-shadow:
        0 10px 30px rgba(0,0,0,0.1);

      text-align: center;

      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {

      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {

      color: #5d4037;

      margin-bottom: 2rem;
    }

    input {

      width: 100%;

      padding: 1rem;

      border-radius: 10px;

      border: 2px solid #ffe082;

      outline: none;

      font-size: 1rem;

      margin-bottom: 1.5rem;

      box-sizing: border-box;
    }

    input:focus {

      border-color: #ffca28;
    }

    button {

      width: 100%;

      padding: 1rem;

      border: none;

      border-radius: 10px;

      background: #ffe082;

      color: #5d4037;

      font-size: 1rem;

      font-weight: bold;

      cursor: pointer;

      transition: 0.2s;
    }

    button:hover {

      background: #ffd54f;

      transform: translateY(-2px);
    }

    .icon {

      font-size: 3rem;

      margin-bottom: 1rem;
    }

    .back-link {

      display: inline-block;

      margin-top: 1.5rem;

      text-decoration: none;

      color: #8d6e63;

      font-size: 0.9rem;
    }

    .back-link:hover {

      text-decoration: underline;
    }

  </style>

</head>

<body>

  <div class="login-box">

    <div class="icon">
      🔐
    </div>

    <h1>Admin Login</h1>

    <input
      type="password"
      id="pw"
      placeholder="Passwort eingeben"
    >

    <button id="loginBtn">
      Einloggen
    </button>

    <a
      href="index.html"
      class="back-link"
    >
      ← Zurück zur Startseite
    </a>

  </div>

  <script>

    const ADMIN_PASSWORD = "281180";

    document
      .getElementById("loginBtn")
      .addEventListener("click", () => {

        const pw =
          document.getElementById("pw").value;

        if (pw === ADMIN_PASSWORD) {

          localStorage.setItem("admin", "true");

          alert("Erfolgreich eingeloggt ✅");

          window.location.href = "index.html";

        } else {

          alert("Falsches Passwort ❌");
        }

      });

  </script>

</body>

</html>
