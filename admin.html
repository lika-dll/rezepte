<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f5ede6">
<link rel="manifest" href="manifest.json">
  <title>Admin Login</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {

  min-height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  padding: 1.5rem;

  font-family: 'Poppins', sans-serif;

  background:
    linear-gradient(
      to bottom,
      #fffdf8,
      #f5f5f5
    );

  color: #2d2d2d;
}

.login-box {

  width: 100%;
  max-width: 380px;

  background:
    rgba(255,255,255,0.88);

  backdrop-filter: blur(14px);

  border-radius: 32px;

  padding: 2.5rem;

  box-shadow:
    0 10px 40px rgba(0,0,0,0.08);

  border:
    1px solid rgba(255,255,255,0.4);

  text-align: center;

  animation: fadeIn 0.45s ease;
}

@keyframes fadeIn {

  from {
    opacity: 0;
    transform: translateY(20px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.icon {

  width: 90px;
  height: 90px;

  margin:
    0 auto 1.5rem auto;

  border-radius: 24px;

  background:
    linear-gradient(
      to bottom right,
      #f8ede3,
      #faedcd
    );

  display: flex;
  justify-content: center;
  align-items: center;

  font-size: 2.5rem;

  box-shadow:
    0 8px 20px rgba(212,163,115,0.15);
}

h1 {

  font-size: 2rem;

  font-weight: 700;

  margin-bottom: 2rem;

  color: #3b3b3b;
}

input {

  width: 100%;

  padding: 1rem 1.2rem;

  border-radius: 18px;

  border: 1px solid #ececec;

  background: #fafafa;

  font-size: 1rem;

  font-family: inherit;

  margin-bottom: 1.3rem;

  transition: all 0.25s ease;
}

input:focus {

  outline: none;

  background: white;

  border-color: #d4a373;

  box-shadow:
    0 0 0 4px rgba(212,163,115,0.12);
}

button {

  width: 100%;

  border: none;

  padding: 1rem;

  border-radius: 18px;

  background:
    linear-gradient(
      to right,
      #d4a373,
      #e6b98f
    );

  color: white;

  font-size: 1rem;

  font-weight: 600;

  font-family: inherit;

  cursor: pointer;

  transition: all 0.25s ease;

  box-shadow:
    0 8px 24px rgba(212,163,115,0.25);
}

button:hover {

  transform: translateY(-3px);

  box-shadow:
    0 12px 28px rgba(212,163,115,0.35);
}

.back-link {

  display: inline-block;

  margin-top: 1.5rem;

  text-decoration: none;

  color: #8b8b8b;

  font-size: 0.95rem;

  transition: 0.2s ease;
}

.back-link:hover {

  color: #d4a373;
}

@media (max-width: 500px) {

  .login-box {

    padding: 2rem;
    border-radius: 26px;
  }

  h1 {

    font-size: 1.7rem;
  }
}

</style>



</head>

<body>

  <div class="login-box">

    <div class="icon">
      🔐
    </div>

    <h1>Admin Login</h1>

    <input
      type="password"
      id="pw"
      placeholder="Passwort eingeben"
    >

    <button id="loginBtn">
      Einloggen
    </button>

    <a
      href="index.html"
      class="back-link"
    >
      ← Zurück zur Startseite
    </a>

  </div>

  <script>

    const ADMIN_PASSWORD = "281180";

    document
      .getElementById("loginBtn")
      .addEventListener("click", () => {

        const pw =
          document.getElementById("pw").value;

        if (pw === ADMIN_PASSWORD) {

          localStorage.setItem("admin", "true");

          alert("Erfolgreich eingeloggt ✅");

          window.location.href = "index.html";

        } else {

          alert("Falsches Passwort ❌");
        }

      });

  </script>

</body>

</html>
